<!DOCTYPE html>
<html>

<head>

<title>AI Crop Disease Detection</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<style>

body{
text-align:center;
font-family:Arial;
background:#f2f2f2;
}

.bar-container{
width:60%;
background:#ddd;
margin:auto;
border-radius:10px;
overflow:hidden;
}

.bar{
background:green;
color:white;
padding:10px;
}

.result-card{
background:white;
padding:20px;
margin:20px auto;
width:60%;
border-radius:10px;
box-shadow:0px 0px 10px rgba(0,0,0,0.2);
text-align:left;
}

</style>

</head>

<body>

<h1>🌿 AI Crop Disease Detection</h1>

<form action="/predict" method="post" enctype="multipart/form-data">

<input type="file" name="image" required>

<br><br>

<button type="submit">Predict Disease</button>

</form>


{% if prediction %}

<div class="result-card">

<h2>Disease: {{ prediction }}</h2>

<div class="bar-container">
<div class="bar" style="width: {{ confidence }}%">
{{ confidence }}% Confidence
</div>
</div>

<br>

<h3>Cause</h3>
<p>{{ cause }}</p>

<h3>Treatment</h3>
<p>{{ treatment }}</p>

{% if pesticides %}
<h3>Recommended Pesticides</h3>

<ul>
{% for p in pesticides %}
<li>{{ p }}</li>
{% endfor %}
</ul>
{% endif %}

</div>

{% endif %}

</body>
</html>
